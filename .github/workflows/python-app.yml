name: Python Application

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install ruff
      run: pip install ruff
    - name: Lint with ruff
      run: ruff check src/ scripts/ --output-format=github

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: pip
    - name: Install lightweight test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest polars numpy scipy scikit-learn pyyaml duckdb
    - name: Run Tests
      run: |
        pytest tests/ -v --ignore=tests/test_audio_utils.py
