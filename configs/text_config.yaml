# Text processing configuration
# Used in: src/features/text_sentiment.py, src/features/text_uncertainty.py, etc.

sentiment:
  model_name: "ProsusAI/finbert"
  batch_size: 16
  max_length: 512
  device: "auto"  # auto-detects CUDA/MPS, falls back to CPU

uncertainty:
  lexicon_path: "configs/lexicons/uncertainty.yaml"
  hedging_path: "configs/lexicons/hedging.yaml"

specificity:
  ner_model: "en_core_web_sm"
  forward_looking_lexicon: "configs/lexicons/forward_looking.yaml"

complexity:
  language: "en"
